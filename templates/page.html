<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Georgia, 'Times New Roman', serif;
      line-height: 1.7;
      color: #1a1a1a;
      background: #fafafa;
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    nav {
      margin-bottom: 1.5rem;
      font-family: -apple-system, sans-serif;
      font-size: 0.85rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    nav a { color: #4a90d9; text-decoration: none; }
    nav a:hover { text-decoration: underline; }
    .delete-btn {
      background: none;
      border: 1px solid #c44;
      color: #c44;
      cursor: pointer;
      font-size: 0.8rem;
      padding: 0.25rem 0.75rem;
      border-radius: 3px;
      font-family: -apple-system, sans-serif;
    }
    .delete-btn:hover { background: #fee; }
    header {
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #ddd;
    }
    header h1 {
      font-size: 1.8rem;
      line-height: 1.3;
      margin-bottom: 0.5rem;
    }
    header .meta {
      font-size: 0.85rem;
      color: #666;
      font-family: -apple-system, sans-serif;
    }
    header .meta a { color: #4a90d9; text-decoration: none; }
    header .meta a:hover { text-decoration: underline; }
    article img {
      max-width: 100%;
      height: auto;
      border-radius: 4px;
      margin: 1rem 0;
    }
    article p { margin-bottom: 1rem; }
    article h2, article h3 { margin: 1.5rem 0 0.5rem; }
    article a { color: #4a90d9; }
    article blockquote {
      border-left: 3px solid #ddd;
      padding-left: 1rem;
      margin: 1rem 0;
      color: #555;
    }
    article pre {
      background: #f0f0f0;
      padding: 1rem;
      overflow-x: auto;
      border-radius: 4px;
      font-size: 0.9rem;
    }
    footer {
      margin-top: 3rem;
      padding-top: 1rem;
      border-top: 1px solid #ddd;
      font-size: 0.8rem;
      color: #999;
      font-family: -apple-system, sans-serif;
    }
  </style>
</head>
<body>
  <nav>
    <a href="/archiver">&larr; All archives</a>
    <button class="delete-btn" onclick="deletePage()">Delete</button>
  </nav>
  <header>
    <h1>{{title}}</h1>
    <div class="meta">
      <span>{{byline}}</span><br>
      <a href="{{url}}" target="_blank">Original</a> &middot; Archived {{date}}
    </div>
  </header>
  <article>
    {{content}}
  </article>
  <footer>
    <a href="/archiver">&larr; All archives</a>
  </footer>
  <script>
    function deletePage() {
      if (!confirm('Delete this archive?')) return;
      fetch(location.pathname, { method: 'DELETE' })
        .then(r => { if (r.ok) location.href = '/archiver'; else alert('Failed to delete'); });
    }
  </script>
</body>
</html>
