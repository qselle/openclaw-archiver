<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Archive</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      line-height: 1.6;
      color: #1a1a1a;
      background: #fafafa;
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    h1 { margin-bottom: 1.5rem; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid #eee; }
    th { font-weight: 600; color: #666; font-size: 0.85rem; text-transform: uppercase; }
    a { color: #4a90d9; text-decoration: none; }
    a:hover { text-decoration: underline; }
    tr:hover { background: #f5f5f5; }
    .date { white-space: nowrap; color: #999; font-size: 0.85rem; }
    .delete-btn {
      background: none;
      border: none;
      color: #c44;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 0.2rem 0.5rem;
      border-radius: 3px;
    }
    .delete-btn:hover { background: #fee; }
    .empty { color: #999; padding: 2rem 0; text-align: center; }
  </style>
</head>
<body>
  <h1>Archive</h1>
  <table>
    <thead>
      <tr><th>Title</th><th>Source</th><th>Archived</th><th></th></tr>
    </thead>
    <tbody>
      {{rows}}
    </tbody>
  </table>
  <script>
    function deletePage(id) {
      if (!confirm('Delete this archive?')) return;
      fetch('/archiver/' + id, { method: 'DELETE' })
        .then(r => { if (r.ok) location.reload(); else alert('Failed to delete'); });
    }
  </script>
</body>
</html>
